[graph]
all-features = true

[advisories]
ignore = []

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Unicode-3.0",
    "CDLA-Permissive-2.0",
    "ISC",
    "BSD-3-Clause",
    "OpenSSL"
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
# FIXME: change to true when we fixed not dev duplicates
multiple-versions-include-dev = false

deny = [
    { crate = "ring", reason = "use the providerless feature instead" }
]

skip = [
    { crate = "core-foundation", reason = "rustify need to bump its dependencies"},
    { crate = "http", reason = "aws crates come with 2 versions"},
    { crate = "http-body", reason = "aws crates come with 2 versions"},
    { crate = "openssl-probe", reason = "native-tls needs to bump"},
    { crate = "security-framework", reason = "reqwest needs to bump"},
    { crate = "syn", reason = "rustify need to bump its dependencies"},
    { crate = "synstructure", reason = "rustify need to bump its dependencies"},
    { crate = "thiserror", reason = "rustify need to bump its dependencies"},
    { crate = "thiserror-impl", reason = "rustify need to bump its dependencies"},
    { crate = "windows-sys", reason = "windows publish breaking version really frequently"},
    { crate = "windows_x86_64_gnullvm", reason = "windows publish breaking version really frequently"},
    { crate = "windows_x86_64_msvc", reason = "windows publish breaking version really frequently"},
    { crate = "windows_x86_64_gnu", reason = "windows publish breaking version really frequently"},
    { crate = "windows_i686_msvc", reason = "windows publish breaking version really frequently"},
    { crate = "windows_i686_gnu", reason = "windows publish breaking version really frequently"},
    { crate = "windows_aarch64_msvc", reason = "windows publish breaking version really frequently"},
    { crate = "windows_aarch64_gnullvm", reason = "windows publish breaking version really frequently"},
    { crate = "windows-targets", reason = "windows publish breaking version really frequently"},
]

[sources]
unknown-registry = "warn"
unknown-git = "warn"
